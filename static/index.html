<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrawlLama API - Web Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

        :root {
            --bg: #0c0f14;
            --bg-2: #151a23;
            --panel: #111723;
            --panel-2: #0f141c;
            --text: #e6ebf5;
            --muted: #9aa6bd;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #4ce0d2;
            --accent-2: #ffb454;
            --danger: #ff6b6b;
            --success: #3ddc97;
            --shadow: rgba(5, 8, 12, 0.6);
        }

        [data-theme="light"] {
            --bg: #f5f3ef;
            --bg-2: #efe9e2;
            --panel: #ffffff;
            --panel-2: #f8f5f0;
            --text: #1f2430;
            --muted: #596071;
            --border: rgba(18, 23, 32, 0.12);
            --accent: #006d77;
            --accent-2: #ff8b3d;
            --danger: #d64545;
            --success: #1f9d6e;
            --shadow: rgba(0, 0, 0, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: radial-gradient(1200px 600px at 20% -10%, rgba(76, 224, 210, 0.2), transparent),
                        radial-gradient(900px 500px at 80% 10%, rgba(255, 180, 84, 0.18), transparent),
                        linear-gradient(160deg, var(--bg) 0%, var(--bg-2) 100%);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.4s ease, color 0.4s ease;
        }

        .ambient {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            width: 320px;
            height: 320px;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.35;
            animation: float 16s ease-in-out infinite;
        }

        .orb.orb-1 {
            background: var(--accent);
            top: -80px;
            left: -40px;
        }

        .orb.orb-2 {
            background: var(--accent-2);
            bottom: -120px;
            right: -40px;
            animation-delay: -6s;
        }

        .app {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 28px;
        }

        header {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 24px;
            align-items: stretch;
            margin-bottom: 28px;
        }

        .hero {
            background: linear-gradient(140deg, rgba(255,255,255,0.08), rgba(255,255,255,0.02));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 24px 60px var(--shadow);
            backdrop-filter: blur(12px);
        }

        .hero h1 {
            font-size: clamp(2rem, 3vw, 3rem);
            margin-bottom: 10px;
            letter-spacing: -0.02em;
        }

        .hero p {
            color: var(--muted);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        .hero .tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--accent);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 18px;
        }

        .pill-link {
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid var(--border);
            color: var(--text);
            background: rgba(255, 255, 255, 0.04);
            transition: transform 0.2s ease, border 0.2s ease, background 0.2s ease;
        }

        .pill-link:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            background: rgba(76, 224, 210, 0.12);
        }

        .status-panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 22px;
            display: grid;
            gap: 14px;
        }

        .status-panel h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--muted);
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .status-card {
            padding: 14px;
            border-radius: 16px;
            background: var(--panel-2);
            border: 1px solid var(--border);
            text-align: left;
        }

        .status-card .value {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .status-card .label {
            font-size: 0.85rem;
            color: var(--muted);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 10px 16px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text);
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 8px 24px var(--shadow);
            transition: transform 0.2s ease, border 0.2s ease;
            z-index: 10;
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 18px;
        }

        .card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 18px 40px var(--shadow);
            display: grid;
            gap: 16px;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease forwards;
        }

        .card::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: inherit;
            border: 1px solid rgba(255, 255, 255, 0.06);
            pointer-events: none;
        }

        .card h2 {
            font-size: 1.2rem;
            letter-spacing: -0.01em;
        }

        .input-group {
            display: grid;
            gap: 8px;
        }

        label {
            font-weight: 600;
            color: var(--muted);
            font-size: 0.9rem;
        }

        input[type="text"],
        textarea,
        select {
            width: 100%;
            background: var(--panel-2);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 0.95rem;
            transition: border 0.2s ease, box-shadow 0.2s ease;
        }

        input[type="text"]:focus,
        textarea:focus,
        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(76, 224, 210, 0.2);
        }

        textarea {
            min-height: 120px;
            resize: vertical;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            border-radius: 999px;
            padding: 10px 18px;
            font-weight: 600;
            cursor: pointer;
            color: #0b1119;
            background: linear-gradient(120deg, var(--accent), #7ef3c7);
            box-shadow: 0 12px 24px rgba(76, 224, 210, 0.25);
            transition: transform 0.2s ease, filter 0.2s ease;
        }

        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.02);
        }

        .btn-secondary {
            background: linear-gradient(120deg, #3a4253, #1f2633);
            color: var(--text);
            box-shadow: none;
            border: 1px solid var(--border);
        }

        .btn-success {
            background: linear-gradient(120deg, var(--success), #7ef3c7);
            color: #04120b;
        }

        .btn-danger {
            background: linear-gradient(120deg, var(--danger), #ff9a9a);
            color: #1a0b0b;
        }

        .response {
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            max-height: 360px;
            overflow-y: auto;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: var(--muted);
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
        }

        .loading {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,.2);
            border-radius: 50%;
            border-top-color: var(--accent);
            animation: spin 1s linear infinite;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
        }

        .stat-card {
            background: var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 14px;
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .stat-label {
            color: var(--muted);
            font-size: 0.85rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(14px); }
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            header {
                grid-template-columns: 1fr;
            }

            .theme-toggle {
                position: static;
                margin-bottom: 18px;
            }

            .app {
                padding: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="ambient">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <button class="theme-toggle" onclick="toggleTheme()">
        <span class="theme-icon">Theme</span>
        <span id="theme-text">Dark Mode</span>
    </button>

    <div class="app">
        <header>
            <div class="hero">
                <div class="tag">CrawlLama Control</div>
                <h1>AI Research Orchestrator</h1>
                <p>Run multi-hop web investigations, OSINT lookups, and memory workflows from a single operational console.</p>
                <div class="hero-actions">
                    <a href="/docs" class="pill-link" target="_blank">Swagger Docs</a>
                    <a href="/redoc" class="pill-link" target="_blank">ReDoc</a>
                    <a href="/health" class="pill-link" target="_blank">Health</a>
                </div>
            </div>
            <div class="status-panel">
                <h2>System Snapshot</h2>
                <div class="status-grid">
                    <div class="status-card">
                        <div class="value" id="storage-theme">-</div>
                        <div class="label">Theme</div>
                    </div>
                    <div class="status-card">
                        <div class="value" id="storage-inputs">-</div>
                        <div class="label">Saved Inputs</div>
                    </div>
                    <div class="status-card">
                        <div class="value" id="storage-apikey">-</div>
                        <div class="label">API Key</div>
                    </div>
                </div>
                <div class="actions">
                    <button class="btn-secondary" onclick="showStorageDetails()">Show Storage</button>
                    <button class="btn-danger" onclick="clearAllStorage()">Clear Storage</button>
                </div>
                <div id="storage-details" class="response" style="display: none;"></div>
            </div>
        </header>

        <section class="grid">
            <div class="card">
                <h2>Search Query</h2>
                <div class="input-group">
                    <label for="query">Question</label>
                    <textarea id="query" placeholder="Enter your search query here..."></textarea>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="use-multihop">
                    <label for="use-multihop">Use Multi-hop Reasoning</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="use-tools" checked>
                    <label for="use-tools">Enable Web Search Tools</label>
                </div>
                <div class="actions">
                    <button onclick="executeQuery()">Run Query</button>
                </div>
                <div id="query-response" class="response" style="display: none;"></div>
            </div>

            <div class="card">
                <h2>Memory Store</h2>
                <div class="input-group">
                    <label for="memory-category">Category</label>
                    <select id="memory-category">
                        <option value="email">Email</option>
                        <option value="phone">Phone</option>
                        <option value="ip">IP Address</option>
                        <option value="username">Username</option>
                        <option value="domain">Domain</option>
                        <option value="note">Note</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="memory-value">Value</label>
                    <input type="text" id="memory-value" placeholder="Enter value to remember...">
                </div>
                <div class="actions">
                    <button class="btn-success" onclick="rememberValue()">Remember</button>
                    <button class="btn-secondary" onclick="recallCategory()">Recall</button>
                    <button class="btn-danger" onclick="forgetValue()">Forget</button>
                </div>
                <div id="memory-response" class="response" style="display: none;"></div>
            </div>

            <div class="card">
                <h2>OSINT Query</h2>
                <div class="input-group">
                    <label for="osint-query">OSINT Query</label>
                    <input type="text" id="osint-query" placeholder="email:example@domain.com, phone:+123456789...">
                </div>
                <div class="actions">
                    <button onclick="executeOSINT()">Execute OSINT</button>
                </div>
                <div id="osint-response" class="response" style="display: none;"></div>
            </div>

            <div class="card">
                <h2>System Statistics</h2>
                <div class="actions">
                    <button class="btn-secondary" onclick="loadStats()">Refresh Stats</button>
                </div>
                <div id="stats-container" style="margin-top: 8px;"></div>
            </div>
        </section>
    </div>

    <script>
        // Theme Toggle with visual feedback
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('crawllama_theme', newTheme);
            document.getElementById('theme-text').textContent = newTheme === 'dark' ? 'Light Mode' : 'Dark Mode';

            showNotification(`Theme changed to ${newTheme === 'dark' ? 'Dark' : 'Light'} Mode`);
            localStorage.setItem('crawllama_theme_timestamp', new Date().toISOString());
            updateStorageInfo();
        }

        // Load saved theme on page load
        window.addEventListener('DOMContentLoaded', () => {
            const savedTheme = localStorage.getItem('crawllama_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('theme-text').textContent = savedTheme === 'dark' ? 'Light Mode' : 'Dark Mode';

            loadSavedInputs();
            updateStorageInfo();
        });

        function saveInput(key, value) {
            if (value) {
                localStorage.setItem('crawllama_input_' + key, value);
            }
        }

        function loadSavedInputs() {
            const lastQuery = localStorage.getItem('crawllama_input_query');
            if (lastQuery) document.getElementById('query').value = lastQuery;

            const lastOsint = localStorage.getItem('crawllama_input_osint');
            if (lastOsint) document.getElementById('osint-query').value = lastOsint;

            const lastMemory = localStorage.getItem('crawllama_input_memory');
            if (lastMemory) document.getElementById('memory-value').value = lastMemory;

            const lastCategory = localStorage.getItem('crawllama_input_category');
            if (lastCategory) document.getElementById('memory-category').value = lastCategory;

            const useMultihop = localStorage.getItem('crawllama_checkbox_multihop');
            if (useMultihop === 'true') document.getElementById('use-multihop').checked = true;

            const useTools = localStorage.getItem('crawllama_checkbox_tools');
            if (useTools !== null) document.getElementById('use-tools').checked = useTools === 'true';
        }

        function showNotification(message) {
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 80px;
                right: 20px;
                background: var(--success);
                color: #05120c;
                padding: 12px 18px;
                border-radius: 12px;
                box-shadow: 0 12px 24px var(--shadow);
                z-index: 1001;
                animation: slideIn 0.3s ease-out;
                font-weight: 600;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-in';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(120px); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(120px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        function getApiKey() {
            let apiKey = localStorage.getItem('crawllama_api_key');
            if (!apiKey) {
                apiKey = prompt('Enter API Key (or leave empty for dev mode):');
                if (apiKey) {
                    localStorage.setItem('crawllama_api_key', apiKey);
                }
            }
            return apiKey;
        }

        async function executeQuery() {
            const query = document.getElementById('query').value;
            const useMultihop = document.getElementById('use-multihop').checked;
            const useTools = document.getElementById('use-tools').checked;
            const responseDiv = document.getElementById('query-response');

            if (!query.trim()) {
                alert('Please enter a query');
                return;
            }

            saveInput('query', query);
            localStorage.setItem('crawllama_checkbox_multihop', useMultihop);
            localStorage.setItem('crawllama_checkbox_tools', useTools);

            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Loading...';

            try {
                const response = await fetch('/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': getApiKey() || ''
                    },
                    body: JSON.stringify({
                        query: query,
                        use_multihop: useMultihop,
                        use_tools: useTools
                    })
                });

                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                showNotification('Query executed');
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
                showNotification('Query failed');
            }
        }

        async function rememberValue() {
            const category = document.getElementById('memory-category').value;
            const value = document.getElementById('memory-value').value;
            const responseDiv = document.getElementById('memory-response');

            if (!value.trim()) {
                alert('Please enter a value');
                return;
            }

            saveInput('category', category);
            saveInput('memory', value);

            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Loading...';

            try {
                const response = await fetch('/memory/remember', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': getApiKey() || ''
                    },
                    body: JSON.stringify({
                        category: category,
                        value: value
                    })
                });

                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                showNotification('Memory saved');
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
                showNotification('Failed to save');
            }
        }

        async function recallCategory() {
            const category = document.getElementById('memory-category').value;
            const responseDiv = document.getElementById('memory-response');

            saveInput('category', category);

            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Loading...';

            try {
                const response = await fetch(`/memory/recall/${category}`, {
                    headers: {
                        'X-API-Key': getApiKey() || ''
                    }
                });

                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                showNotification(`Recalled ${data.count || 0} ${category} entries`);
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
                showNotification('Recall failed');
            }
        }

        async function forgetValue() {
            const category = document.getElementById('memory-category').value;
            const value = document.getElementById('memory-value').value;
            const responseDiv = document.getElementById('memory-response');

            if (!value.trim()) {
                if (!confirm('No value specified. Clear entire category?')) return;
            }

            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Loading...';

            try {
                const response = await fetch('/memory/forget', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': getApiKey() || ''
                    },
                    body: JSON.stringify({
                        category: value ? category : 'all',
                        value: value || null
                    })
                });

                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                showNotification('Memory deleted');
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
                showNotification('Delete failed');
            }
        }

        async function executeOSINT() {
            const query = document.getElementById('osint-query').value;
            const responseDiv = document.getElementById('osint-response');

            if (!query.trim()) {
                alert('Please enter an OSINT query');
                return;
            }

            saveInput('osint', query);

            responseDiv.style.display = 'block';
            responseDiv.textContent = 'Loading...';

            try {
                const response = await fetch('/osint/query', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': getApiKey() || ''
                    },
                    body: JSON.stringify({
                        query: query
                    })
                });

                const data = await response.json();
                responseDiv.textContent = JSON.stringify(data, null, 2);
                showNotification('OSINT query executed');
            } catch (error) {
                responseDiv.textContent = 'Error: ' + error.message;
                showNotification('OSINT query failed');
            }
        }

        async function loadStats() {
            const container = document.getElementById('stats-container');
            container.innerHTML = '<div class="loading"></div>';

            try {
                const response = await fetch('/stats', {
                    headers: {
                        'X-API-Key': getApiKey() || ''
                    }
                });

                const data = await response.json();

                const statsHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-value">${Math.floor(data.uptime / 60)}m</div>
                            <div class="stat-label">Uptime</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.resource_stats?.system?.cpu_percent?.toFixed(1) || 'N/A'}%</div>
                            <div class="stat-label">CPU Usage</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-value">${data.resource_stats?.system?.memory_percent?.toFixed(1) || 'N/A'}%</div>
                            <div class="stat-label">Memory Usage</div>
                        </div>
                    </div>
                    <div class="response" style="margin-top: 12px;">${JSON.stringify(data, null, 2)}</div>
                `;
                container.innerHTML = statsHTML;
            } catch (error) {
                container.innerHTML = '<div class="response">Error: ' + error.message + '</div>';
            }
        }

        function updateStorageInfo() {
            const theme = localStorage.getItem('crawllama_theme') || 'dark';
            document.getElementById('storage-theme').textContent = theme === 'dark' ? 'Dark' : 'Light';

            let inputCount = 0;
            const inputKeys = ['query', 'osint', 'memory', 'category'];
            inputKeys.forEach(key => {
                if (localStorage.getItem('crawllama_input_' + key)) inputCount++;
            });
            document.getElementById('storage-inputs').textContent = inputCount;

            const hasApiKey = localStorage.getItem('crawllama_api_key') ? 'Set' : 'None';
            document.getElementById('storage-apikey').textContent = hasApiKey;
        }

        function showStorageDetails() {
            const details = document.getElementById('storage-details');
            const allData = {};

            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('crawllama_')) {
                    let value = localStorage.getItem(key);
                    if (key === 'crawllama_api_key' && value) {
                        value = value.substring(0, 8) + '...' + value.substring(value.length - 4);
                    }
                    allData[key.replace('crawllama_', '')] = value;
                }
            }

            details.style.display = 'block';
            details.textContent = JSON.stringify(allData, null, 2);
            updateStorageInfo();
        }

        function clearAllStorage() {
            if (!confirm('Clear all saved data from browser? This cannot be undone.')) {
                return;
            }

            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('crawllama_')) {
                    keysToRemove.push(key);
                }
            }

            keysToRemove.forEach(key => localStorage.removeItem(key));

            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('theme-text').textContent = 'Light Mode';

            document.getElementById('query').value = '';
            document.getElementById('osint-query').value = '';
            document.getElementById('memory-value').value = '';
            document.getElementById('use-multihop').checked = false;
            document.getElementById('use-tools').checked = true;

            document.getElementById('storage-details').style.display = 'none';

            updateStorageInfo();
            showNotification('All browser data cleared');
        }
    </script>
</body>
</html>
