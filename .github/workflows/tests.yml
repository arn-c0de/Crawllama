# Runs the test suite and lint checks on every push and pull request.
# Tests run offline: external services (Ollama, Redis) are mocked or
# fall back gracefully, and tiktoken tests skip without network access.

name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra all --extra testing

      - name: Lint (ruff)
        run: uv run --with ruff ruff check .

      - name: Run test suite
        run: uv run python -m pytest tests/ -q
