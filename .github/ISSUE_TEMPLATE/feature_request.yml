name: ✨ Feature Request
description: Propose a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your feature proposal!
        
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: What problem would this feature solve?
      placeholder: Describe the problem or use case
    validations:
      required: true
      
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should the feature work?
      placeholder: Describe your ideal solution
    validations:
      required: true
      
  - type: textarea
    id: alternatives
    attributes:
      label: Alternative Approaches
      description: Have you considered other solutions?
      placeholder: Describe alternative approaches
      
  - type: textarea
    id: example
    attributes:
      label: Code Example (optional)
      description: Show how the feature could be used
      render: python
      placeholder: |
        # Example usage
        agent.new_feature(param="value")
        
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Would be useful
        - Important
        - Critical
    validations:
      required: true
      
  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to contribute to this feature?
      options:
        - label: I would like to create a pull request
