# GitHub Issue Templates

name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!
        
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the problem in as much detail as possible
      placeholder: Tell us what you experienced
    validations:
      required: true
      
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should happen in your opinion?
      placeholder: Describe the expected behavior
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Start CrawlLama with '...'
        2. Execute command '...'
        3. See error
    validations:
      required: true
      
  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of CrawlLama are you using?
      placeholder: e.g. v1.3.0
    validations:
      required: true
      
  - type: input
    id: python-version
    attributes:
      label: Python Version
      description: Which Python version?
      placeholder: e.g. Python 3.12.0
    validations:
      required: true
      
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      multiple: false
      options:
        - Windows
        - Linux
        - macOS
    validations:
      required: true
      
  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: Please add relevant logs from logs/app.log
      render: shell
      
  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Further information, screenshots, etc.
