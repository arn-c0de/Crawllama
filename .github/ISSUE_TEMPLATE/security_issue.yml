name: "🔒 Security Issue / Vulnerability"
description: Report a security vulnerability or concern
labels: ["security", "triage"]
title: "[Security] <Short summary>"
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ---
        ## 🔒 Security Issue / Vulnerability
        _Use this template to responsibly report security concerns or vulnerabilities._
        ---

  - type: textarea
    id: description
    attributes:
      label: "🛡️ Description of the Issue"
      description: |
        Clearly describe the security issue or vulnerability.
      placeholder: |-
        Example:
        • Unauthenticated access to admin endpoints
        • Sensitive data exposure in logs
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: "⚠️ Potential Impact"
      description: |
        What could happen if this issue is exploited? Who/what is affected?
      placeholder: |-
        - Data loss
        - Unauthorized access
        - Service disruption
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "📝 Steps to Reproduce (if applicable)"
      description: |
        Provide steps, code, or configuration to reproduce the issue.
      placeholder: |-
        1. Step 1
        2. Step 2
        3. ...
    validations:
      required: false

  - type: textarea
    id: mitigation
    attributes:
      label: "💡 Suggested Mitigation (optional)"
      description: |
        Suggest how this issue could be fixed or mitigated.
      placeholder: |-
        - Restrict access
        - Sanitize logs
    validations:
      required: false
